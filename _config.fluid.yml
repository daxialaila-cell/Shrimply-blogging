#---------------------------
# Fluid 主题配置 - Mac 极简风格
#---------------------------

# 导航栏
navbar:
  blog_title: "xfxe"
  menu:
    - { key: "home", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "archive", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "category", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "tag", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "about", link: "/about/", icon: "iconfont icon-user-fill" }

# 搜索
search:
  enable: false

# 首页
index:
  banner_img: /img/default.png
  banner_img_height: 70
  banner_mask_alpha: 0.2
  slogan:
    enable: true
    text: ""
  auto_excerpt:
    enable: true
  post_meta:
    date: true
    category: true
    tag: false
  post_url_target: _self

# 文章页
post:
  banner_img: /img/default.png
  banner_img_height: 50
  banner_mask_alpha: 0.2
  meta:
    author:
      enable: false
    date:
      enable: true
      format: "LL a"
    wordcount:
      enable: true
    min2read:
      enable: true
      awl: 2
      wpm: 60
    views:
      enable: false
  updated:
    enable: false
  category_bar:
    enable: false
  toc:
    enable: true
    expand_all: false
    placement: right
    headingSelector: "h1,h2,h3"
    collapseDepth: 1
  copyright:
    enable: false
  prev_next:
    enable: true
  image_caption:
    enable: false
  image_zoom:
    enable: true
  footnote:
    enable: true
  math:
    enable: false
  mermaid:
    enable: false
  comments:
    enable: false

# 颜色 - Mac 风格纯白极简
color:
  body_bg_color: "#f5f5f7"
  body_bg_color_dark: "#1d1d1f"
  navbar_bg_color: "#ffffff"
  navbar_bg_color_dark: "#1d1d1f"
  navbar_text_color: "#1d1d1f"
  navbar_text_color_dark: "#f5f5f7"
  subtitle_color: "#86868b"
  subtitle_color_dark: "#a1a1a6"
  text_color: "#1d1d1f"
  text_color_dark: "#f5f5f7"
  sec_text_color: "#86868b"
  sec_text_color_dark: "#a1a1a6"
  board_color: "#ffffff"
  board_color_dark: "#2d2d2f"
  post_text_color: "#1d1d1f"
  post_text_color_dark: "#e5e5e7"
  post_heading_color: "#1d1d1f"
  post_heading_color_dark: "#f5f5f7"
  post_link_color: "#0066cc"
  post_link_color_dark: "#64a8ff"
  link_hover_color: "#0066cc"
  link_hover_bg_color: "#f5f5f7"
  link_hover_bg_color_dark: "#3d3d3f"
  line_color: "#d2d2d7"
  line_color_dark: "#424245"
  scrollbar_color: "#c4c4c6"
  scrollbar_color_dark: "#68686a"
  scrollbar_hover_color: "#a6a6a8"
  scrollbar_hover_color_dark: "#9d9d9f"
  button_bg_color: "transparent"
  button_bg_color_dark: "transparent"
  button_hover_bg_color: "#f5f5f7"
  button_hover_bg_color_dark: "#3d3d3f"

# 字体 - 对应 macOS San Francisco
font:
  font_size: 15px
  font_family: '-apple-system, BlinkMacSystemFont, "SF Pro SC", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif'
  letter_spacing: 0.01em
  code_font_size: 85%

# 页脚
footer:
  content: '
    <a href="https://hexo.io" target="_blank" rel="nofollow noopener"><span>Hexo</span></a>
    <i class="iconfont icon-love"></i>
    <a href="https://github.com/fluid-dev/hexo-theme-fluid" target="_blank" rel="nofollow noopener"><span>Fluid</span></a>
  '
  statistics:
    enable: false

# 暗色模式
dark_mode:
  enable: true
  default: auto

# 好玩功能
fun_features:
  typing:
    enable: false
  anchorjs:
    enable: true
    placement: left
    visible: always
    icon: "#"
  progressbar:
    enable: true
    height_px: 2
    color: "#0066cc"
    options: { showSpinner: false, trickleSpeed: 150 }

# 分类页
category:
  enable: true
  banner_img_height: 50
  banner_mask_alpha: 0.2

# 标签页
tag:
  enable: true
  banner_img_height: 50
  banner_mask_alpha: 0.2

# 关于页
about:
  enable: true
  banner_img_height: 50
  banner_mask_alpha: 0.2
  avatar: /img/avatar.png
  name: "xfxe"
  intro: "一个喜欢折腾的开发者"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/xfxe", tip: "GitHub" }

# 归档页
archive:
  banner_img_height: 50
  banner_mask_alpha: 0.2

# 404页
page404:
  enable: true
  banner_img_height: 50
  banner_mask_alpha: 0.2

# 友链页
links:
  enable: false

# 代码高亮风格
code:
  copy_btn: true
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "atom-one-light"
      style_dark: "atom-one-dark"

# 静态资源 CDN（保持默认）
static_prefix:
  internal_js: /js
  internal_css: /css
  internal_img: /img
